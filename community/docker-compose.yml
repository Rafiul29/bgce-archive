services:
  bgce_community:
    image: community:local
    container_name: bgce-community
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      VERSION: 1.0.0
      MODE: debug
      SERVICE_NAME: community
      HTTP_PORT: 8082

      JWT_SECRET: "your-secret-key-change-in-production"

      APM_SERVICE_NAME: ""
      APM_SERVER_URL: ""
      APM_SECRET_TOKEN: ""
      APM_ENVIRONMENT: "development"

      RABBITMQ_URL: "amqp://admin:admin@rabbitmq:5672"
      RMQ_RECONNECT_DELAY: 5
      RMQ_RETRY_INTERVAL: 600
      RMQ_QUEUE_PREFIX: "community-dev"

      COMMUNITY_DB_DSN: "postgresql://postgres:root@postgres:5432/community_db?sslmode=disable"
      COMMUNITY_DB_DRIVER: "postgres"

    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - bgce-network

  postgres:
    image: postgres:15-alpine
    container_name: bgce-community-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - community_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bgce-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: bgce-community-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - community_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bgce-network

networks:
  bgce-network:
    driver: bridge

volumes:
  community_postgres_data:
  community_rabbitmq_data:
